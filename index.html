<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Kids Birthday Casino</title>
    <style>
        body { font-family: Arial; background: linear-gradient(#1a0033, #4a0088); color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffd700; text-shadow: 0 0 20px #ffd700; font-size: 2.8em; margin: 10px; }
        #canvas { background: #2a0044; border: 12px solid #ffd700; border-radius: 20px; box-shadow: 0 0 50px #ffd700; margin: 20px auto; display: block; max-width: 100%; }
        .balance { font-size: 34px; color: #ffd700; margin: 15px; text-shadow: 0 0 15px #ffd700; }
        .controls { margin: 25px 0; }
        button { font-size: 28px; padding: 18px 50px; margin: 8px; background: #ffd700; color: #1a0033; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 0 25px #ffd700; }
        button:active { transform: scale(0.95); }
        .win { animation: flash 0.6s infinite; }
        @keyframes flash { 0%,100% { color: #ffd700; } 50% { color: #00ff88; } }
        p { font-size: 24px; font-weight: bold; margin: 15px; }
    </style>
</head>
<body>
    <h1>🎰 NIECE CASINO 🎰</h1>
    <div class="balance">Gold Tokens: <span id="balance">1000</span></div>
    
    <canvas id="canvas" width="650" height="320"></canvas>
    
    <div class="controls">
        <button onclick="spin()">SPIN! 🎰</button><br>
        <button onclick="adjustJackpot(10)">🔥 MORE Jackpots ↑</button>
        <button onclick="adjustJackpot(-10)">LESS Jackpots ↓</button>
    </div>
    
    <p>💰 Gold Jackpot chance: <span id="jackpotChance">75</span>% — They hit ALL the time!</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let balance = 1000;
        let jackpotProb = 75;
        
        const symbols = [
            { emoji: '💰', value: 200, name: 'GOLD JACKPOT' },
            { emoji: '🎂', value: 100, name: 'Birthday Cake' },
            { emoji: '🦄', value: 80, name: 'Unicorn' },
            { emoji: '🍕', value: 60, name: 'Pizza' },
            { emoji: '⭐', value: 50, name: 'Star' },
            { emoji: '🌈', value: 70, name: 'Rainbow' }
        ];
        
        let reels = Array(5).fill().map(() => symbols[0]);
        
        function draw() {
            ctx.fillStyle = '#2a0044';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const reelWidth = canvas.width / 5;
            for (let i = 0; i < 5; i++) {
                ctx.font = '95px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(reels[i].emoji, reelWidth * i + reelWidth/2, 205);
                
                if (reels[i].emoji === '💰') {
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 45;
                    ctx.fillText('💰', reelWidth * i + reelWidth/2, 205);
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        function spin() {
            if (balance < 20) return alert("Not enough tokens!");
            balance -= 20;
            document.getElementById('balance').textContent = balance;
            
            const spinInterval = setInterval(() => {
                reels = reels.map(() => symbols[Math.floor(Math.random() * symbols.length)]);
                draw();
            }, 35);
            
            setTimeout(() => {
                clearInterval(spinInterval);
                
                if (Math.random() * 100 < jackpotProb) {
                    reels[2] = symbols[0]; // middle reel is jackpot
                }
                
                let winAmount = 0;
                reels.forEach(r => { if (r.emoji === '💰') winAmount += r.value; });
                
                if (winAmount > 0) {
                    balance += winAmount * 3; // big payout
                    document.getElementById('balance').textContent = balance;
                    document.getElementById('balance').classList.add('win');
                    setTimeout(() => document.getElementById('balance').classList.remove('win'), 3000);
                    alert(`🎉 MASSIVE JACKPOT! +${winAmount * 3} Gold Tokens! 💰💰💰`);
                }
                draw();
            }, 1500);
        }
        
        function adjustJackpot(change) {
            jackpotProb = Math.max(30, Math.min(98, jackpotProb + change));
            document.getElementById('jackpotChance').textContent = jackpotProb;
        }
        
        draw();
        setInterval(draw, 80);
    </script>
</body>
</html>
